# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: readme-svg
on:
  schedule:
    - cron: "15 03 1 * *"
  workflow_dispatch:

permissions: {}

jobs:
  readme-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        id: badger-badger-snake-snake
        name: Generate Snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark
      - name: Commit Snake
        continue-on-error: true
        id: git-commit-snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "<>"
          git add github-snake.svg
          git add github-snake-dark.svg
          git commit -m "chore: github-snake.svg - [skip actions]" github-snake.svg github-snake-dark.svg
          git push origin ${{ env.GITHUB_REF_NAME }}
